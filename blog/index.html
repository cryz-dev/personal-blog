<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/icon.jpg" style="border-radius: 50%;">
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans,geist Mono@400,500&display=swap" rel="stylesheet">
    <title>Blog — Chris Limberg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #ffffff;
            background: #0B0B0B;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            gap: 24px;
            margin-bottom: 48px;
            padding-top: 20px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #ffffff;
        }

        nav a.active {
            color: #ffffff;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .blog-list {
            list-style: none;
            padding: 0;
        }

        .blog-list li {
            margin-bottom: 24px;
        }

        .blog-list a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #ffffff;
        }

        .blog-list a:hover .blog-title {
            color: #888;
        }

        .blog-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .blog-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: color 0.2s;
        }

        .blog-tags {
            display: flex;
            gap: 6px;
        }

        .blog-tag {
            font-family: 'Geist Mono', 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 3px 8px;
            background: rgba(255,255,255,0.08);
            color: #888;
            border-radius: 12px;
            text-transform: lowercase;
        }

        .blog-date {
            font-size: 14px;
            color: #666;
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 14px;
        }

        .footer-links {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">home</a>
        <a href="/blog" class="active">blog</a>
        <a href="/goals.html">goals</a>
        <a href="/track-record.html">track record</a>
    </nav>

    <h1>Blog</h1>

    <ul class="blog-list">
        <li>
            <a href="/blog/the-final-gamble.html">
                <div class="blog-title-row">
                    <div class="blog-title">4 months into building a tech startup</div>
                    <div class="blog-tags">
                        <span class="blog-tag">work</span>
                        <span class="blog-tag">learnings</span>
                    </div>
                </div>
                <div class="blog-date">Mar 10, 2026</div>
            </a>
        </li>
        <li>
            <a href="/blog/building-acta.html">
                <div class="blog-title-row">
                    <div class="blog-title">Building Acta</div>
                    <div class="blog-tags">
                        <span class="blog-tag">work</span>
                    </div>
                </div>
                <div class="blog-date">Feb 20, 2026</div>
            </a>
        </li>
    </ul>

    <footer>
        <ul class="footer-links">
            <li>© 2026 Chris Limberg</li>
            <li><a href="https://www.instagram.com/chrislimbergg/" target="_blank" rel="noopener">@chrislimbergg</a></li>
            <li><a href="https://www.youtube.com/@cryz_yt" target="_blank" rel="noopener">@cryz_yt</a></li>
            <li><a href="https://www.youtube.com/@louismorgner" target="_blank" rel="noopener">@louismorgner</a></li>
        </ul>
    </footer>
</body>
</html>
